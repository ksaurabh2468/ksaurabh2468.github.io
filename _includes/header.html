<header class="site-header">
  <nav class="nav wrap" aria-label="Primary">
    <a href="{{ '/#top' | relative_url }}" class="brand">
      <span class="mark"><span>K</span></span>
      <span>Kumar Saurabh</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="nav-links">
      {% for item in site.nav %}
        <li><a href="{{ item.url | relative_url }}">{{ item.label }}</a></li>
      {% endfor %}
      <li>
        <button class="cmdk-hint" type="button" aria-label="Open quick navigation (Ctrl+K)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <kbd>Ctrl</kbd><kbd>K</kbd>
        </button>
      </li>
      <li class="nav-cta">
        {% if site.social.resume %}
          <a href="{{ site.social.resume | relative_url }}" class="btn btn--primary" target="_blank" rel="noopener">Résumé</a>
        {% else %}
          <a href="{{ '/#contact' | relative_url }}" class="btn btn--primary">Get in touch</a>
        {% endif %}
      </li>
    </ul>
  </nav>
</header>
