<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07080c" />
  <meta name="color-scheme" content="dark" />

  <script>
    // mark JS availability + skip the intro curtain on revisits (this session)
    (function () {
      var d = document.documentElement;
      d.classList.add("js");
      try { if (sessionStorage.getItem("ks-visited")) d.classList.add("revisit"); } catch (e) {}
    })();
  </script>

  <title>{% if page.title and page.url != '/' %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>

  {% seo %}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% feed_meta %}

  <!-- Monogram favicon -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2322d3ee'/%3E%3Cstop offset='1' stop-color='%237c5cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Ctext x='32' y='44' font-family='monospace' font-size='34' font-weight='700' text-anchor='middle' fill='%2304121a'%3EK%3C/text%3E%3C/svg%3E" />
</head>
<body id="top"
  data-email="{{ site.social.email }}"
  data-linkedin="{{ site.social.linkedin }}"
  data-github="{{ site.social.github }}">

  <div class="preloader" aria-hidden="true">
    <div class="pre-inner">
      <span class="pre-mark">K</span>
      <span class="pre-count">0</span>
    </div>
  </div>

  <div class="bg-aurora" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="scroll-progress" aria-hidden="true"></div>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Command palette -->
  <div class="cmdk" id="cmdk" hidden>
    <div class="cmdk-backdrop" data-cmdk-close></div>
    <div class="cmdk-panel" role="dialog" aria-modal="true" aria-label="Quick navigation">
      <div class="cmdk-head">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="cmdk-input" type="text" placeholder="Where to? Try “work” or “email”…" aria-label="Search commands" autocomplete="off" spellcheck="false" />
        <kbd>ESC</kbd>
      </div>
      <ul class="cmdk-list" role="listbox" aria-label="Commands"></ul>
    </div>
  </div>

  <!-- Back to top -->
  <button class="to-top" type="button" aria-label="Back to top">
    <svg class="ring-svg" width="52" height="52" viewBox="0 0 52 52" aria-hidden="true">
      <circle class="ring-bg" cx="26" cy="26" r="24"></circle>
      <circle class="ring-fg" cx="26" cy="26" r="24"></circle>
    </svg>
    <svg class="arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
